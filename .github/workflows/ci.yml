name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Download dependencies
        run: go mod tidy

      - name: Run tests
        run: go test -v -race ./...

      - name: Build
        run: go build -o dns-watchdog .

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
